# dnsmasq configuration for the Ethereum-paid Wi-Fi hotspot
# Place at /etc/dnsmasq.d/eth-wifi.conf

interface=wlan0-ap
bind-interfaces

# DHCP range for clients
dhcp-range=10.88.0.10,10.88.0.250,255.255.255.0,24h
dhcp-option=3,10.88.0.1
dhcp-option=6,10.88.0.1

# Upstream DNS (do NOT point to 127.0.0.1:53 to avoid a loop with mihomo).
# Use a public resolver or your router DNS.
server=223.5.5.5
server=119.29.29.29
no-resolv

# Captive portal detection domain hijacking
# These domains must resolve to the portal so phones/tablets show the popup.
address=/captive.apple.com/10.88.0.1
address=/www.apple.com/10.88.0.1
address=/gsp1.apple.com/10.88.0.1
address=/www.appleiphonecell.com/10.88.0.1
address=/connectivitycheck.gstatic.com/10.88.0.1
address=/clients3.google.com/10.88.0.1
address=/www.google.com/10.88.0.1
address=/android.clients.google.com/10.88.0.1
address=/clients1.google.com/10.88.0.1
address=/clients4.google.com/10.88.0.1
address=/www.msftconnecttest.com/10.88.0.1
address=/msftconnecttest.com/10.88.0.1
address=/dns.msftncsi.com/10.88.0.1
address=/nm.check-network.org/10.88.0.1
address=/wifi.vivo.com.cn/10.88.0.1
address=/connectivity-check.ubuntu.com/10.88.0.1
address=/connectivity.check.network/10.88.0.1
address=/connect.rom.miui.com/10.88.0.1
address=/connectivitycheck.platform.hicloud.com/10.88.0.1
address=/detectportal.firefox.com/10.88.0.1

# Log DHCP leases for debugging
log-dhcp
