# hostapd configuration for the Ethereum-paid Wi-Fi hotspot
# Place at /etc/hostapd/eth-wifi.conf

interface=wlan0-ap
driver=nl80211

ssid=Free-WiFi-Pay-ETH
hw_mode=g
channel=10

# 802.11n
ieee80211n=1
wmm_enabled=1

# Open network (authentication happens via captive portal)
auth_algs=1
wpa=0

# Prevent wireless clients from talking to each other.
ap_isolate=1

macaddr_acl=0
ignore_broadcast_ssid=0

# Limit client count to keep the low-power USB adapter stable
max_num_sta=8

# Beacon interval and DTIM
beacon_int=100
dtim_period=2
